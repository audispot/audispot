<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISP Registration | AudioSpot</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-lg bg-slate-800 rounded-2xl shadow-xl border border-slate-700/50 p-8">
        <!-- Logo / Branding -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-indigo-600/10 text-indigo-500 mb-3">
                <i class="fa-solid fa-tower-broadcast text-3xl"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-white">Register your ISP</h1>
            <p class="text-slate-400 text-sm mt-1">Get started with AudioSpot management system</p>
        </div>

        <!-- Alert Notification -->
        <div id="alert-box" class="hidden mb-6 p-4 rounded-lg text-sm font-medium"></div>

        <!-- Signup Form -->
        <form id="signup-form" class="space-y-5">
            <!-- Brand / ISP Name -->
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">ISP / Brand Name</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                        <i class="fa-solid fa-globe"></i>
                    </span>
                    <input type="text" id="inp-brand-name" required placeholder="e.g. SwiftNet Broadband" 
                        class="w-full pl-10 pr-4 py-2.5 bg-slate-900 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition text-sm">
                </div>
            </div>

            <!-- Admin Contact Details (Two Columns) -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Admin Name</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                            <i class="fa-solid fa-user"></i>
                        </span>
                        <input type="text" id="inp-admin-name" required placeholder="John Doe" 
                            class="w-full pl-10 pr-4 py-2.5 bg-slate-900 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition text-sm">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Support Phone</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                            <i class="fa-solid fa-phone"></i>
                        </span>
                        <input type="tel" id="inp-phone" required placeholder="+254 700 000000" 
                            class="w-full pl-10 pr-4 py-2.5 bg-slate-900 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition text-sm">
                    </div>
                </div>
            </div>

            <!-- Email Address -->
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Email Address</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                        <i class="fa-solid fa-envelope"></i>
                    </span>
                    <input type="email" id="inp-email" required placeholder="admin@isp.com" 
                        class="w-full pl-10 pr-4 py-2.5 bg-slate-900 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition text-sm">
                </div>
            </div>

            <!-- Password -->
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="inp-password" required placeholder="••••••••" minlength="6"
                        class="w-full pl-10 pr-4 py-2.5 bg-slate-900 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition text-sm">
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="btn-submit"
                class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg shadow-lg hover:shadow-indigo-500/20 transition flex items-center justify-center gap-2 text-sm mt-2">
                <span>Create ISP Account</span>
                <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>

        <!-- Footer -->
        <div class="mt-8 pt-6 border-t border-slate-700/50 text-center text-sm text-slate-400">
            Already have an account? 
            <a href="../login/index.html" class="text-indigo-400 hover:underline font-medium">Log in here</a>
        </div>
    </div>

    <!-- Script to handle Form Submission -->
    <script>
        // Set your backend base URL
        const API_BASE_URL = window.location.origin.includes('localhost') 
            ? 'http://localhost:5000' 
            : 'https://your-production-api.com';

        const signupForm = document.getElementById('signup-form');
        const alertBox = document.getElementById('alert-box');
        const submitBtn = document.getElementById('btn-submit');

        function showAlert(message, isError = false) {
            alertBox.innerText = message;
            alertBox.className = isError 
                ? "mb-6 p-4 rounded-lg text-sm font-medium bg-rose-500/10 text-rose-400 border border-rose-500/20"
                : "mb-6 p-4 rounded-lg text-sm font-medium bg-emerald-500/10 text-emerald-400 border border-emerald-500/20";
            alertBox.classList.remove('hidden');
        }

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Collect Form Data
            const payload = {
                brandName: document.getElementById('inp-brand-name').value.trim(),
                adminName: document.getElementById('inp-admin-name').value.trim(),
                phone: document.getElementById('inp-phone').value.trim(),
                email: document.getElementById('inp-email').value.trim(),
                password: document.getElementById('inp-password').value
            };

            // Loading UI state
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin mr-2"></i> Registering...`;
            alertBox.classList.add('hidden');

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/register-isp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.message || "Registration failed. Please try again.");
                }

                showAlert("Success! Your ISP has been registered. Redirecting to login...", false);
                
                // Store provisional token or ID if provided by backend
                if (result.token) {
                    localStorage.setItem('auth_token', result.token);
                }

                // Redirect to Login page or dashboard after 2 seconds
                setTimeout(() => {
                    window.location.href = '../login/index.html';
                }, 2000);

            } catch (err) {
                showAlert(err.message, true);
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<span>Create ISP Account</span> <i class="fa-solid fa-arrow-right"></i>`;
            }
        });
    </script>
</body>
</html>
