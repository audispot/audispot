<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISP Login | AudioSpot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#090d16] text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-[#111827] rounded-2xl shadow-xl border border-[#1f293d] p-8">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-indigo-600/10 text-indigo-500 mb-3">
                <i class="fa-solid fa-tower-broadcast text-3xl"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-white">Welcome Back</h1>
            <p class="text-slate-400 text-sm mt-1">Log in to manage your ISP network portal</p>
        </div>

        <div id="alert-box" class="hidden mb-6 p-4 rounded-lg text-sm font-medium"></div>

        <form id="login-form" class="space-y-5">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Email Address</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                        <i class="fa-solid fa-envelope"></i>
                    </span>
                    <input type="email" id="inp-email" required placeholder="admin@isp.com" 
                        class="w-full pl-10 pr-4 py-2.5 bg-[#131a2c] border border-[#1f293d] rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition text-sm">
                </div>
            </div>

            <div>
                <div class="flex justify-between items-center mb-2">
                    <label class="text-xs font-semibold uppercase tracking-wider text-slate-400">Password</label>
                    <a href="#" class="text-xs text-indigo-400 hover:underline">Forgot?</a>
                </div>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="inp-password" required placeholder="••••••••" 
                        class="w-full pl-10 pr-4 py-2.5 bg-[#131a2c] border border-[#1f293d] rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition text-sm">
                </div>
            </div>

            <button type="submit" id="btn-submit"
                class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg shadow-lg hover:shadow-indigo-500/20 transition flex items-center justify-center gap-2 text-sm mt-2">
                <span>Access Dashboard</span>
                <i class="fa-solid fa-sign-in-alt"></i>
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-[#1f293d] text-center text-sm text-slate-400">
            Don't have an ISP account? 
            <a href="../signup/" class="text-indigo-400 hover:underline font-medium">Register here</a>
        </div>
    </div>

    <script>
        // Set your backend base URL automatically
        const API_BASE_URL = window.location.origin.includes('localhost')
            ? 'http://localhost:8080'
            : 'https://audispoty-749056206562.europe-west1.run.app';

        const loginForm = document.getElementById('login-form');
        const alertBox = document.getElementById('alert-box');
        const submitBtn = document.getElementById('btn-submit');

        function showAlert(message, isError = false) {
            alertBox.innerText = message;
            alertBox.className = isError 
                ? "mb-6 p-4 rounded-lg text-sm font-medium bg-rose-500/10 text-rose-400 border border-rose-500/20"
                : "mb-6 p-4 rounded-lg text-sm font-medium bg-emerald-500/10 text-emerald-400 border border-emerald-500/20";
            alertBox.classList.remove('hidden');
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Collect Credentials
            const payload = {
                email: document.getElementById('inp-email').value.trim(),
                password: document.getElementById('inp-password').value
            };

            // Loading UI state
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin mr-2"></i> Authenticating...`;
            alertBox.classList.add('hidden');

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/isp-login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (!response.ok || !result.success) {
                    throw new Error(result.error || "Authentication failed. Please check your credentials.");
                }

                showAlert("Authentication successful! Loading your control center...", false);
                
                // CRITICAL: Save the token and ISP Identity to bypass the Dashboard's Session Guard
                localStorage.setItem('auth_token', result.token);
                localStorage.setItem('isp_id', result.ispId);
                localStorage.setItem('isp_name', result.ispName || '');

                // Redirect to the main system dashboard
                setTimeout(() => {
                    window.location.href = '../Dashboard/'; // Adjust this path if your file is named dashboard.html
                }, 1500);

            } catch (err) {
                showAlert(err.message, true);
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<span>Access Dashboard</span> <i class="fa-solid fa-sign-in-alt"></i>`;
            }
        });
    </script>
</body>
</html>
