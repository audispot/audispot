<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotspot Gateway Connect</title>
    <!-- Tailwind CSS for modern dashboard looks -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for layout icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 dark:bg-zinc-950 text-slate-800 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">

    <!-- Main Dynamic Interface Container -->
    <div class="bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 rounded-2xl max-w-sm w-full p-6 shadow-xl space-y-6">
        
        <!-- Header Brand Section -->
        <div class="text-center space-y-2">
            <div class="w-12 h-12 bg-indigo-600/10 text-indigo-500 rounded-full flex items-center justify-center mx-auto text-xl">
                <i class="fa-solid fa-wifi"></i>
            </div>
            <h1 id="portal-brand-title" class="text-lg font-black tracking-tight text-slate-900 dark:text-white">
                Loading...
            </h1>
            <p id="portal-welcome-text" class="text-xs text-slate-400">
                Please wait while we synchronize configuration metrics...
            </p>
        </div>

        <hr class="border-slate-100 dark:border-zinc-800/80">

        <!-- Dynamic Access Packages Target Mount Grid -->
        <div class="space-y-2">
            <label class="text-[11px] font-bold tracking-wider uppercase text-slate-400 block mb-3">Select Internet Pass</label>
            <div id="public-packages-wrapper" class="space-y-2">
                <!-- JavaScript loads dynamic inputs smoothly here -->
                <div class="text-center py-6 text-slate-500 animate-pulse text-xs">
                    <i class="fa-solid fa-circle-notch fa-spin text-base mb-2 text-indigo-500"></i>
                    <p>Fetching billing catalogue profiles...</p>
                </div>
            </div>
        </div>

        <!-- Submission Trigger Buttons -->
        <div class="pt-2">
            <button id="portal-connect-btn" class="w-full py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl text-xs transition shadow-lg shadow-indigo-600/10 flex items-center justify-center gap-2">
                <span>Proceed to Pay & Connect</span>
                <i class="fa-solid fa-arrow-right-to-bracket text-[10px]"></i>
            </button>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- JAVASCRIPT EXECUTION LAYER                 -->
    <!-- ========================================== -->
    <script>
        // 1. Explicitly define your backend base URL so this independent folder page can locate it
        const API_BASE_URL = "https://audispoty-749056206562.europe-west1.run.app"; 

        document.addEventListener('DOMContentLoaded', () => {
            renderConsumerPortalView();
        });

        async function renderConsumerPortalView() {
            // 2. Extract the unique ISP ID from the URL browser query parameters
            const urlParams = new URLSearchParams(window.location.search);
            const ispId = urlParams.get('ispId');

            if (!ispId) {
                console.error("No ISP identification routing token provided in the URL.");
                const wrapper = document.getElementById('public-packages-wrapper');
                if (wrapper) {
                    wrapper.innerHTML = `
                        <div class="text-center py-4 text-rose-400 border border-rose-500/10 bg-rose-500/5 rounded-xl font-medium">
                            <i class="fa-solid fa-triangle-exclamation block text-lg mb-1"></i>
                            Invalid Hotspot Gateway Configuration (Missing ISP ID).
                        </div>
                    `;
                }
                return;
            }

            try {
                // 3. Query both the custom branding layout configuration and their exact package tiers concurrently
                const [designRes, packagesRes] = await Promise.all([
                    fetch(`${API_BASE_URL}/api/portal/design?ispId=${ispId}`),
                    fetch(`${API_BASE_URL}/api/packages?ispId=${ispId}`)
                ]);

                if (!designRes.ok) throw new Error("Could not pull design layout rules.");

                const config = await designRes.json();
                
                // 4. Apply the custom branding variables dynamically to the DOM elements
                if (document.getElementById('portal-brand-title')) {
                    document.getElementById('portal-brand-title').innerText = config.brandName || 'Hotspot Gateway';
                }
                if (document.getElementById('portal-welcome-text')) {
                    document.getElementById('portal-welcome-text').innerText = config.welcomeGreeting || 'Welcome Online.';
                }
                
                // Apply custom accent colors across action elements
                const accentColor = config.accentColor || '#4f46e5';
                const primaryButton = document.getElementById('portal-connect-btn');
                if (primaryButton) {
                    primaryButton.style.backgroundColor = accentColor;
                }

                // 5. Safely render the custom pricing package catalog grid
                if (packagesRes.ok) {
                    let packages = await packagesRes.json();
                    if (packages && !Array.isArray(packages)) {
                        packages = packages.packages || packages.data || [];
                    }
                    renderPortalPackagesGrid(packages, accentColor);
                }

            } catch (err) {
                console.error("Critical routing breakdown mapping portal tenant layout:", err);
                const wrapper = document.getElementById('public-packages-wrapper');
                if (wrapper) {
                    wrapper.innerHTML = `<p class="text-xs text-slate-400 text-center py-4">Failed to initialize data synchronization channel.</p>`;
                }
            }
        }

        // Quick helper to translate raw hours into readable formats for buyers (e.g. 168 hours -> 7 Days)
        function formatPackageDuration(totalHours) {
            const hours = Number(totalHours || 0);
            if (hours >= 720 && hours % 720 === 0) {
                const months = hours / 720;
                return `${months} Month${months > 1 ? 's' : ''}`;
            }
            if (hours >= 168 && hours % 168 === 0) {
                const weeks = hours / 168;
                return `${weeks} Week${weeks > 1 ? 's' : ''}`;
            }
            if (hours >= 24 && hours % 24 === 0) {
                const days = hours / 24;
                return `${days} Day${days > 1 ? 's' : ''}`;
            }
            return `${hours} Hour${hours !== 1 ? 's' : ''}`;
        }

        function renderPortalPackagesGrid(packages, accentColor) {
            const wrapper = document.getElementById('public-packages-wrapper');
            if (!wrapper) return;

            if (!packages || packages.length === 0) {
                wrapper.innerHTML = `<p class="text-xs text-slate-400 text-center py-4">No internet passes available right now.</p>`;
                return;
            }

            wrapper.innerHTML = packages.map((pkg, idx) => {
                const pkgId = pkg.id || pkg.docId || '';
                const readableDuration = formatPackageDuration(pkg.duration);
                
                return `
                    <label class="p-3.5 border rounded-xl flex items-center justify-between cursor-pointer bg-slate-50 dark:bg-zinc-950/40 transition hover:bg-slate-100/50 dark:hover:bg-zinc-950/80" 
                           style="${idx === 0 ? `border-color: ${accentColor}; border-width: 2px;` : 'border-color: #374151;'}">
                        <div class="flex items-center gap-3">
                            <input type="radio" name="selectedPlan" value="${pkgId}" ${idx === 0 ? 'checked' : ''} style="accent-color: ${accentColor}">
                            <div>
                                <p class="text-xs font-bold text-slate-900 dark:text-white">${pkg.packageName || 'Standard Plan'}</p>
                                <p class="text-[10px] text-slate-400">${readableDuration} Access</p>
                            </div>
                        </div>
                        <span class="text-xs font-black" style="color: ${accentColor}">KES ${pkg.price || 0}</span>
                    </label>
                `;
            }).join('');
        }
    </script>
</body>
</html>
